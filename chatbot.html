<!doctype html>
<html>
  <head>
    <title>ChatBot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatmessage, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInput(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          if (!inputText.trim()) return;

          const userInput = inputText;

          setChatMessages((prev) => [
            ...prev,
            {
              message: userInput,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ]);

          setInputText("");
          setIsLoading(true);

          setTimeout(() => {
            const response = Chatbot.getResponse(userInput);

            setChatMessages((prev) => [
              ...prev,
              {
                message: response,
                sender: "bot",
                id: crypto.randomUUID(),
              },
            ]);

            setIsLoading(false);
          }, 1000);
        }

        return (
          <div className="chat-input-container">
            <input
              type="text"
              placeholder="Type your message here..."
              onChange={saveInput}
              value={inputText}
              size="30"
              className="chat-input"
            />

            <button onClick={sendMessage} className="send-button">
              Send
            </button>

            {isLoading && <div className="loader"></div>}
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // if (sender === "bot") {
        //   return (
        //     <div>
        //       <img src="robot.png" width="50" height="50" />
        //       {message}
        //     </div>
        //   );
        // }
        return (
          <div
            className={
              sender === "user" ? "chat-message-user" : "chat-message-bot"
            }
          >
            {sender === "bot" && (
              <img src="robot.png" className="chat-message-profile" />
            )}
            <div className="message">{message}</div>
            {sender === "user" && (
              <img src="user.png" className="chat-message-profile" />
            )}
          </div>
        );
      }

      function ChatMessages({ chatmessage }) {
        return (
          <div className="chat-messages-conatiner">
            {chatmessage.map((chatmessage) => {
              return (
                <ChatMessage
                  message={chatmessage.message}
                  sender={chatmessage.sender}
                  key={chatmessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const array = React.useState([
          {
            message: "Hello",
            sender: "user",
            id: "Id1",
          },
          {
            message: "Hello, how can I help you?",
            sender: "bot",
            id: "Id2",
          },
          {
            message: "What is today's date?",
            sender: "user",
            id: "Id3",
          },
          {
            message: "Today is 23 May 2026",
            sender: "bot",
            id: "Id4",
          },
        ]);
        const [chatmessage, setChatMessages] = array;
        return (
          <div className="app-container">
            <h1>ChatBot</h1>
            <ChatMessages chatmessage={chatmessage} />
            <ChatInput
              chatmessage={chatmessage}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
