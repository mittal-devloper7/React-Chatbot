<!doctype html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatmessage, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInput(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          if (!inputText.trim()) return;

          const response = Chatbot.getResponse(inputText);

          setChatMessages([
            ...chatmessage,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
            {
              message: response,
              sender: "bot",
              id: crypto.randomUUID(),
            },
          ]);

          setInputText("");
        }

        return (
          <>
            <input
              type="text"
              placeholder="Type your message here..."
              onChange={saveInput}
              value={inputText}
              size="30"
            />
            <button onClick={sendMessage}>Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // if (sender === "bot") {
        //   return (
        //     <div>
        //       <img src="robot.png" width="50" height="50" />
        //       {message}
        //     </div>
        //   );
        // }
        return (
          <div>
            {sender === "bot" && <img src="robot.png" width="50" height="50" />}
            {message}
            {sender === "user" && <img src="user.png" width="50" height="50" />}
          </div>
        );
      }

      function ChatMessages({ chatmessage }) {
        return (
          <>
            {chatmessage.map((chatmessage) => {
              return (
                <ChatMessage
                  message={chatmessage.message}
                  sender={chatmessage.sender}
                  key={chatmessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        const array = React.useState([
          {
            message: "Hello",
            sender: "user",
            id: "Id1",
          },
          {
            message: "Hello, how can I help you?",
            sender: "bot",
            id: "Id2",
          },
          {
            message: "What is today's date?",
            sender: "user",
            id: "Id3",
          },
          {
            message: "Today is 23 May 2026",
            sender: "bot",
            id: "Id4",
          },
        ]);
        const [chatmessage, setChatMessages] = array;
        return (
          <>
            <ChatInput
              chatmessage={chatmessage}
              setChatMessages={setChatMessages}
            />
            <ChatMessages chatmessage={chatmessage} />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
