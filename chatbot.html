<!doctype html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input
              type="text"
              placeholder="Type your message here..."
              size="30"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage(props) {
        const message = props.message;
        const sender = props.sender;
        return (
          <div>
            {message}
            <img
              src={sender !== "user" ? "robot.png" : "user.png"}
              width="50"
              height="50"
            />
          </div>
        );
      }

      const app = (
        <>
          <ChatInput />
          <ChatMessage message="Hello" sender="user" />
          <ChatMessage message="Hello, how can I help you?" sender="bot" />
          <ChatMessage message="What is today's date?" sender="user" />
          <ChatMessage message="Today is 23 May 2026" sender="bot" />
        </>
      );
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
